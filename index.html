<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

/* البادج */
.badge {

    right: -8px;
     background: #ff3040;

  font-size: 14px;

    height: 16px;

    align-items: center;

/* الظهور */
.badge.show {

}


/* كل عنصر إشعار */

    align-items: center;

<script>
   
function attachFile(){

function handleFile(event){
    let file = event.target.files[0];

// Record voice
let mediaRecorder, audioChunks = [];
function recordVoice(){
    if(mediaRecorder && mediaRecorder.state === "recording"){
        mediaRecorder.stop(); // stop recording
        return;
    }

    navigator.mediaDevices.getUserMedia({ audio:true })
        .then(stream=>{
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = e => {
                const audioBlob = new Blob(audioChunks, { type:"audio/mp3" });
                console.log("Voice recorded:", audioBlob);
                // هنا تبعت الصوت للسيرفر
            };

            mediaRecorder.start();
            console.log("Recording started... click again to stop");
        })
        .catch(err => alert("Microphone access denied 🔴"));
}

<script>
let count = 0;

async function loadUser(senderId) {

function updateBadge() {
    const badge = document.getElementById("count");
    if (count > 0) {
        badge.style.display = "block";
      
        badge.innerText = count > 99 ? "99+" : count;
    } else {
        badge.style.display = "none";
    }
    if (count <= 0) {

}
}
function addNotification(msg) {
    count++;

    const icon = document.getElementById("icon");
    icon.style.display = "block";

    const not = document.getElementById("not");

    const li = document.createElement("li");

    // 🔹 صورة البروفايل
    const img = document.createElement("img");
     const user = allUsers.find(u => u._ID == msg.senderid);
    
    img.src = user && user._Image 
        ? `data:image/jpeg;base64,${user._Image}` 
        : "https://i.pravatar.cc/35";

    const content = document.createElement("div");

    const name = document.createElement("div");
    name.textContent = user ? user._Name : "Unknown";
    name.style.fontWeight = "bold";
    name.style.fontSize = "13px";

    const text = document.createElement("div");
    text.textContent = msg.text;
    text.style.fontSize = "12px";
    text.style.color = "#555";

    content.appendChild(name);
    content.appendChild(text);

    li.appendChild(img);
    li.appendChild(content);

    // 🔥 مهم
    li.setAttribute("data-id", msg.senderid);
    li.setAttribute("data-notid", msg.notID);

    li.onclick = function () {
        const id = this.getAttribute("data-id");

        const user = allUsers.find(u => u._ID == id);
        if (user) openChat(user);

        const allNot = document.querySelectorAll(`#not li[data-id='${id}']`);

        allNot.forEach(item => {
            item.remove();
            count--;

        updateBadge();

        allNot.forEach(item => {
            const notId = item.getAttribute("data-notid");
            if (notId) {

            }
        });
    };

    not.appendChild(li);

function formatDate(date){
    return new Date(date).toLocaleString("en-GB", {
        year:'numeric',
        month:'2-digit',
        day:'2-digit',
        hour:'2-digit',
        minute:'2-digit'
    });
}

function timeSince(date) {
    if (!date) return "Offline"; // لو null

    const seconds = Math.floor((new Date() - new Date(date)) / 1000);

    let interval = Math.floor(seconds / 31536000);
    if (interval >= 1) return interval + " year" + (interval > 1 ? "s" : "") + " ago";

    interval = Math.floor(seconds / 2592000);
    if (interval >= 1) return interval + " month" + (interval > 1 ? "s" : "") + " ago";

    interval = Math.floor(seconds / 86400);
    if (interval >= 1) return interval + " day" + (interval > 1 ? "s" : "") + " ago";

    interval = Math.floor(seconds / 3600);
    if (interval >= 1) return interval + " hour" + (interval > 1 ? "s" : "") + " ago";

    interval = Math.floor(seconds / 60);
    if (interval >= 1) return interval + " minute" + (interval > 1 ? "s" : "") + " ago";

    return "Just now";
}
function formatDateing(dateStr) {
    if (!dateStr) return null;
   
    return dateStr.split('.')[0]; // "2026-03-21T01:28:16.4008557" => "2026-03-21T01:28:16"

            $("#chatWith").text(user._Name);
            openChat(user);
        });

        ul.append(li);
    });
}

    $("#messages").empty();
    

    $.get(`http://masterx.runasp.net/api/User/UserChat?id=${sender_id}&receverId=${recever_id}`,function(res){
      
      res.forEach(m => {
    let cls = m._SenderID === sender_id ? "me" : "them";
    $("#messages").append(`
        <div class="message ${cls}">
            <div>${m.text}</div>

            <div class="message-meta">
                <span class="message-time">
                    ${timeSince(formatDateing(m.sentAt))}
                </span>

                ${cls === "me" ? `
                    <span class="status">
                        ${getStatusIcon(m.status)}
                    </span>
                ` : ""}
            </div>
        </div>
    `);
});

        $("#messages").scrollTop($("#messages")[0].scrollHeight);
         const unreadMessages = res.filter(m => m._SenderID !== sender_id && m.status !== 2 );
        console.log("Unread messages to mark as read:", unreadMessages);
         unreadMessages.forEach(msg => {
            connection.invoke("markAsRead", msg._ID,msg._SenderID); // السيرفر يحدث status = Read ويبلغ الـ sender
        });

    });
}
function getStatusIcon(status){
    if(status === 0) return "✔";              // Sent
    if(status === 1)return "<span style='color:black;'>✔✔</span>";           // Delivered
    if(status === 2) return "<span class='read'>✔✔</span>"; // Read (أزرق)
    return "";
}
function openProfile(userId) {
    window.location.href = `userinf.html?idofprof=${userId}`;
}

let msid=null;
// ================= SEND =================
function sendMessage() {
    let msg = $("#msg").val().trim();
    if (!msg || !recever_id) return;
    
    connection.invoke("sendPrivateMessage", sender_id, recever_id, msg)
        .then((msgId) => {
            msid=msgId;
            connection.invoke("createNotification", msgId);
            
           $("#messages").append(`
                <div class="message me" id="msg-${msgId}" data-msgid="${msgId}">
                    <div>${msg}</div>
                    <div class="message-meta">
                        <span class="message-time">${timeSince(new Date())}</span>
                        <span class="status">${getStatusIcon(status || 0)}</span>
                    </div>
                </div>
            `);

            
            $("#messages").scrollTop($("#messages")[0].scrollHeight);
            $("#msg").val("");

            
        })
        .catch(err => {
            console.error("FULL ERROR:", err);
        });
}

     const icon = document.getElementById("icon");

function logout(){
    if(connection) connection.stop();
    localStorage.clear();
    window.location.href="login.html";
}
